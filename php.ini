# Moodle PHP Configuration

; ========== Memory and Performance ==========
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
max_input_vars = 5000

; ========== File Upload ==========
upload_max_filesize = 50M
post_max_size = 50M

; ========== Error Handling ==========
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
log_errors = On
error_log = /var/log/php-errors.log

; ========== Date/Time ==========
date.timezone = UTC

; ========== Session ==========
session.name = MoodleSessionID
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax
session.gc_probability = 1
session.gc_divisor = 100
session.gc_maxlifetime = 1440

; ========== OPcache - IMPORTANT for performance ==========
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1
opcache.enable_cli = 1
opcache.validate_timestamps = 1

; ========== Disable Functions (For Security) ==========
; disable_functions = passthru,exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; ========== Default Charset ==========
default_charset = UTF-8

; ========== Short Tags ==========
short_open_tag = Off

; ========== Output Buffering ==========
output_buffering = 0
implicit_flush = Off

; ========== Realpath Cache ==========
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; ========== XML ==========
extension_dir = /usr/local/lib/php/extensions/no-debug-non-zts-20240924/

; ========== FPM Status Page ==========
pm.status_path = /status

; ========== Default Include Path ==========
include_path = ".:/usr/local/lib/php"

; ========== Mail Configuration ==========
; mail.add_x_header = On
; mail.from = "moodle@localhost"

; ========== SMTP (Override in config.php) ==========
; SMTP = localhost
; smtp_port = 25

; ========== Track Variables ==========
variables_order = "EGPCS"
request_order = "GP"

; ========== Expose PHP ==========
expose_php = Off

; ========== Enable xdebug for development (optional) ==========
; zend_extension = xdebug
; xdebug.mode = develop,debug
; xdebug.start_with_request = yes
; xdebug.client_host = host.docker.internal
; xdebug.client_port = 9003
; xdebug.log = /var/log/xdebug.log

; ========== JSON ==========
; json.error_handler = error_handler (PHP 8.3+)
